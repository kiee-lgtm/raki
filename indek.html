  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    header {
      background: #111;
      color: #fff;
      padding: 50px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
    }

    nav a:hover {
      color: #00adb5;
    }

    .hero {
      height: 90vh;
      background: linear-gradient(to right, #00adb5, #393e46);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 50px;
    }

    .hero h1 {
      font-size: 3em;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #f4f4f4;
      padding: 20px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    footer {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #00adb5;
      color: white;
      cursor: pointer;
      margin-top: 15px;
      border-radius: 5px;
    }

    button:hover {
      background: #028a90;
    }
  </style>
</head>
